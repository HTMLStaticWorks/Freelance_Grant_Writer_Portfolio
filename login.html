<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fr.Writer | Client Portal Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: hidden;
            background: var(--bg-color);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" style="border-bottom: none; background: transparent;">
        <div class="container nav-container">
            <a href="index.html" class="logo-wrapper">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span class="logo-text">Fr.Writer</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Expertise</a></li>
                <li><a href="blog.html">Insights</a></li>
                <li><a href="contact.html">Reach Out</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-wrapper">
        <div class="auth-box">
            <h1>Client Portal</h1>
            <p>Access active drafts, invoices, and style guides.</p>
            
            <form action="#" method="POST">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="client@company.com" required>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" style="display: flex; justify-content: space-between;">
                        Password
                        <a href="#" style="color: var(--secondary); text-transform: none; font-weight: 500;">Forgot?</a>
                    </label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;">Sign In</button>
            </form>

            <div style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 24px;">
                <p style="font-size: 0.95rem; color: var(--text-muted);">
                    Don't have an active project? <br>
                    <a href="signup.html" style="color: var(--secondary); font-weight: 600;">Request a Free Consultation</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
