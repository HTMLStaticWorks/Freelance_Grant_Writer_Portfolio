<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mr.Writer</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Specific rules for Auth pages centering */
        .auth-card .logo {
            justify-content: center;
        }

        /* Hide scrollbar but keep scroll functionality */
        body {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }
        body::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .auth-toggles {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            z-index: 1000;
        }

        [dir="rtl"] .auth-toggles {
            right: auto;
            left: 2rem;
        }

        .or-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--secondary-text);
            font-size: 0.85rem;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .or-divider:not(:empty)::before {
            margin-right: .5em;
        }

        .or-divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>
<body data-theme="light">
    <div class="auth-page">
        <!-- Theme and RTL Toggles -->
        <div class="auth-toggles">
            <label class="theme-switch">
                <input type="checkbox" class="theme-checkbox">
                <span class="slider">
                    <div class="slider-icons">
                        <i class="ri-moon-line"></i>
                        <i class="ri-sun-line"></i>
                    </div>
                </span>
            </label>
            <button class="rtl-toggle-btn">RTL</button>
        </div>

        <div class="auth-card fade-up visible">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <img src="assets/images/logo.png" alt="Mr.Writer">
                    Mr.Writer
                </a>
                <h2 style="margin-top: 1rem;">Welcome Back</h2>
                <p>Login to your storyteller dashboard</p>
            </div>

            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="" required>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <div class="checkbox-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 0; font-size: 0.9rem;">
                        <input type="checkbox" id="remember" style="width: auto;">
                        <label for="remember" style="margin-bottom: 0;">Remember me</label>
                    </div>
                    <a href="#" style="font-size: 0.8rem; color: var(--accent-color); font-weight: 500;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
                
                <div class="or-divider">or login with</div>

                <div class="social-btns" style="margin-top: 0;">
                    <button type="button" class="btn-social btn-apple">
                        <i class="ri-apple-fill" style="font-size: 1.25rem; color: var(--text-color);"></i>
                        Continue with Apple
                    </button>
                    <button type="button" class="btn-social btn-google">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        Continue with Google
                    </button>
                    <button type="button" class="btn-social btn-email">
                        <img src="https://www.svgrepo.com/show/303161/gmail-icon-logo.svg" alt="Email">
                        Continue with Email
                    </button>
                </div>
            </form>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                <span>Don't have an account?</span>
                <a href="register.html" style="color: var(--accent-color); font-weight: 600; margin-left: 5px;">Register here</a>
            </div>
        </div>
    </div>

    <!-- main.js included for animation handling -->
    <script src="assets/js/main.js"></script>
</body>
</html>
