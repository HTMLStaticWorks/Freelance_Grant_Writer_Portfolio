<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mr.Writer</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Specific rules for Auth pages centering */
        .auth-card .logo {
            justify-content: center;
        }

        /* Hide scrollbar but keep scroll functionality */
        body {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }
        body::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }
    </style>
</head>
<body data-theme="light">
    <div class="auth-page">
        <div class="auth-card fade-up visible">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <img src="assets/images/logo.png" alt="Mr.Writer">
                    Mr.Writer
                </a>
                <h2 style="margin-top: 1rem;">Welcome Back</h2>
                <p>Login to your storyteller dashboard</p>
            </div>

            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <input type="checkbox" id="remember" style="width: auto;">
                    <label for="remember" style="margin-bottom: 0;">Remember me</label>
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
            </form>

            <div class="social-btns">
    
    <!-- GOOGLE BUTTON -->
    <button class="btn-social btn-google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        Continue with Google
    </button>

    <!-- EMAIL BUTTON -->
    <button class="btn-social btn-email">
        <img src="https://www.svgrepo.com/show/303161/gmail-icon-logo.svg" alt="Email">
        Continue with Email
    </button>

</div>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                <span>Don't have an account?</span>
                <a href="register.html" style="color: var(--accent-color); font-weight: 600; margin-left: 5px;">Register here</a>
            </div>
        </div>
    </div>

    <!-- main.js included for animation handling if needed, but no theme toggle used here -->
    <script src="assets/js/main.js"></script>
</body>
</html>
