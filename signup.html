<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fr.Writer | Consultation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--bg-color);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" style="border-bottom: none; background: transparent;">
        <div class="container nav-container">
            <a href="index.html" class="logo-wrapper">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span class="logo-text">Fr.Writer</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Expertise</a></li>
                <li><a href="blog.html">Insights</a></li>
                <li><a href="contact.html">Reach Out</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Auth Container (Signup) -->
    <div class="auth-wrapper" style="align-items: flex-start; padding-top: 140px;">
        <div class="auth-box" style="max-width: 600px; margin: 0 auto; text-align: left;">
            <span class="section-label">Complimentary Review</span>
            <h1 style="font-size: 2.5rem; margin-bottom: 24px;">Project Evaluation</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem;">
                Submit your current landing page or sales asset. We will provide a 15-minute Loom video tearing down the copy and highlighting immediate conversion leaks—completely free.
            </p>
            
            <form action="#" method="POST">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" placeholder="Sarah" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" placeholder="Connor" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="form-label">Professional Email</label>
                    <input type="email" class="form-input" placeholder="sarah@techstartup.io" required>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="form-label">Landing Page URL</label>
                    <input type="url" class="form-input" placeholder="https://..." required>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="form-label">Core Objective</label>
                    <select class="form-input" style="appearance: none; background: transparent; cursor: pointer;">
                        <option value="">Select main goal...</option>
                        <option value="leads">Increase Lead Quality</option>
                        <option value="sales">Boost Direct Sales</option>
                        <option value="brand">Clarify Brand Messaging</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 40px; padding: 20px;">Request Teardown</button>
            </form>

        </div>
    </div>

</body>
</html>
